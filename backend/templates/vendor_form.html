{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Vendor | NexusProcurement{% endblock %}
{% block page_title %}{% if editing %}Edit Vendor{% else %}New Vendor{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Contact Person</label>
        <input type="text" name="contact_person" value="{{ record.contact_person|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ record.email|default:'' }}">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ record.phone|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <input type="text" name="category" value="{{ record.category|default:'' }}">
      </div>
      <div class="form-group">
        <label>Rating</label>
        <input type="number" step="0.01" name="rating" value="{{ record.rating|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="blacklisted" {% if record.status == 'blacklisted' %}selected{% endif %}>Blacklisted</option>
          <option value="pending_approval" {% if record.status == 'pending_approval' %}selected{% endif %}>Pending Approval</option>
        </select>
      </div>
      <div class="form-group">
        <label>Payment Terms</label>
        <input type="text" name="payment_terms" value="{{ record.payment_terms|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Vendor</button>
      <a href="/vendors/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
